---
- name: Install MariaDB server and Python driver
  dnf:
    name:
      - mariadb-server
      - python3-PyMySQL
    state: present

- name: Enable and start MariaDB
  systemd:
    name: mariadb
    enabled: yes
    state: started

- name: Create Dolibarr database
  mysql_db:
    name: "{{ db_name }}"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock

- name: Create Dolibarr database user
  mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "{{ db_name }}.*:ALL"
    host: localhost
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock
